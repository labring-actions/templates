---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}-minio
  annotations:
    originImageName: registry.cn-hangzhou.aliyuncs.com/fastgpt/minio:RELEASE.2025-09-07T16-13-09Z
    deploy.cloud.sealos.io/minReplicas: '4'
    deploy.cloud.sealos.io/maxReplicas: '4'
  labels:
    app: ${{ defaults.app_name }}-minio
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-minio
spec:
  replicas: 4
  serviceName: ${{ defaults.app_name }}-minio
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-minio
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-minio
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-minio
          image: registry.cn-hangzhou.aliyuncs.com/fastgpt/minio:RELEASE.2025-09-07T16-13-09Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - http://${{ defaults.app_name }}-minio-{0...3}.${{ defaults.app_name }}-minio.${{ SEALOS_NAMESPACE }}.svc.cluster.local/data
            - "--console-address=:9001"
          env:
            - name: MINIO_ROOT_USER
              value: ${{ inputs.s3_access_key }}
            - name: MINIO_ROOT_PASSWORD
              value: ${{ inputs.s3_secret_key }}
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        annotations:
          path: /data
          value: ' ${{  inputs.s3_storage }} '
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{  inputs.s3_storage }}Gi

