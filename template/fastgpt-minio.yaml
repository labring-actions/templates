apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: fastgpt-minio
spec:
  title: 'FastGPT + Minio'
  url: 'https://ai.fastgpt.in/'
  gitRepo: 'https://github.com/labring/FastGPT'
  author: 'Sealos'
  description: 'FastGPT 是一个基于 LLM 大语言模型的知识库问答系统，提供开箱即用的数据处理、模型调用等能力。同时可以通过 Flow 可视化进行工作流编排，从而实现复杂的问答场景！'
  readme: 'https://raw.githubusercontent.com/labring/FastGPT/main/README.md'
  icon: 'https://raw.githubusercontent.com/labring/FastGPT/main/.github/imgs/logo.svg'
  templateType: inline
  locale: zh
  i18n:
    en:
      description: 'A free, open-source, and powerful AI knowledge base platform, offers out-of-the-box data processing, model invocation, RAG retrieval, and visual AI workflows. Easily build complex LLM applications.'
      readme: 'https://raw.githubusercontent.com/labring/FastGPT/main/README_en.md'
  categories:
    - ai
  defaults:
    app_name:
      type: string
      value: fastgpt-${{ random(8) }}
    app_host:
      type: string
      value: ${{ random(8) }}
    session_secret:
      type: string
      value: ${{ random(8) }}
    root_key:
      type: string
      value: ${{ random(8) }}
    aiproxy_key:
      type: string
      value: ${{ random(8) }}
    plugin_token:
      type: string
      value: ${{ random(8) }}
  inputs:
    root_password:
      description: 'root user''s password，username is: root'
      type: string
      default: '123456'
      required: true
    s3_access_key:
      description: 'S3 access key'
      type: string
      default: 'minioadmin'
      required: true
    s3_secret_key:
      description: 'S3 secret key'
      type: string
      default: 'minioadmin'
      required: true
    s3_storage:
      description: 'Storage size for each server in Gi (4 servers in total)'
      type: number
      default: '1'
      required: true
    s3_port:
      description: 'S3 port'
      type: string
      default: '9000'
      required: true
    s3_use_ssl:
      description: 'use ssl for s3 endpoint'
      type: string
      default: 'false'
      required: true
    s3_endpoint:
      description: 'S3 endpoint'
      type: string
      default: '${{ defaults.app_name }}-minio.${{ SEALOS_NAMESPACE }}.svc.cluster.local'
      required: true
    s3_external_base_url:
      description: 's3 external base url'
      type: string
      default: 'https://${{ defaults.app_host }}api.${{ SEALOS_CLOUD_DOMAIN }}'
      required: true
    s3_public_bucket:
      description: 's3 public bucket name'
      type: string
      default: 'fastgpt-public'
      required: true
    s3_private_bucket:
      description: 's3 private bucket name'
      type: string
      default: 'fastgpt-private'
      required: true

---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-mongo
    app.kubernetes.io/instance: ${{ defaults.app_name }}-mongo
    app.kubernetes.io/managed-by: kbcli
  name: ${{ defaults.app_name }}-mongo

---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
  name: ${{ defaults.app_name }}-pg

---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-redis
    app.kubernetes.io/instance: ${{ defaults.app_name }}-redis
    app.kubernetes.io/managed-by: kbcli
  name: ${{ defaults.app_name }}-redis

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: registry.cn-hangzhou.aliyuncs.com/fastgpt/fastgpt:v4.14.4
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: registry.cn-hangzhou.aliyuncs.com/fastgpt/fastgpt:v4.14.4
          env:
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mongo-conn-credential
                  key: password
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: password
            - name: FE_DOMAIN
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: DEFAULT_ROOT_PSW
              value: ${{ inputs.root_password }}
            - name: ROOT_KEY
              value: ${{ defaults.root_key }}
            - name: DB_MAX_LINK
              value: '100'
            - name: TOKEN_KEY
              value: ${{ defaults.session_secret }}
            - name: FILE_TOKEN_KEY
              value: filetoken
            - name: AES256_SECRET_KEY
              value: fastgptsecret

            - name: AIPROXY_API_ENDPOINT
              value: http://${{ defaults.app_name }}-aiproxy.${{ SEALOS_NAMESPACE }}.svc:3000
            - name: AIPROXY_API_TOKEN
              value: ${{ defaults.aiproxy_key }}
            - name: SANDBOX_URL
              value: http://${{ defaults.app_name }}-sandbox.${{ SEALOS_NAMESPACE }}.svc.cluster.local:3000
            - name: PLUGIN_BASE_URL
              value: http://${{ defaults.app_name }}-plugin.${{ SEALOS_NAMESPACE }}.svc.cluster.local:3000
            - name: PLUGIN_TOKEN
              value: ${{ defaults.plugin_token }}
            
            - name: MONGODB_URI
              value: >-
                mongodb://root:$(MONGO_PASSWORD)@${{ defaults.app_name }}-mongo-mongodb.${{ SEALOS_NAMESPACE }}.svc:27017/fastgpt?authSource=admin
            - name: PG_URL
              value: >-
                postgresql://postgres:$(PG_PASSWORD)@${{ defaults.app_name }}-pg-postgresql.${{ SEALOS_NAMESPACE }}.svc:5432/postgres
            - name: REDIS_URL
              value: >-
                redis://default:$(REDIS_PASSWORD)@${{ defaults.app_name }}-redis-redis.${{ SEALOS_NAMESPACE }}.svc:6379
            
            - name: LOG_LEVEL
              value: info
            - name: STORE_LOG_LEVEL
              value: warn
            # 安全配置
            - name: CHAT_FILE_EXPIRE_TIME
              value: 15
            - name: WORKFLOW_MAX_RUN_TIMES
              value: '500'
            - name: WORKFLOW_MAX_LOOP_TIMES
              value: '50'
            - name: S3_EXTERNAL_BASE_URL
              value: ${{ inputs.s3_external_base_url }}
            - name: S3_ENDPOINT
              value: ${{ inputs.s3_endpoint }}
            - name: S3_PORT
              value: ${{ inputs.s3_port }}
            - name: S3_ACCESS_KEY
              value: ${{ inputs.s3_access_key }}
            - name: S3_SECRET_KEY
              value: ${{ inputs.s3_secret_key }}
            - name: S3_PUBLIC_BUCKET
              value: ${{ inputs.s3_public_bucket }}
            - name: S3_PRIVATE_BUCKET
              value: ${{ inputs.s3_private_bucket }}
            - name: S3_USE_SSL
              value: ${{ inputs.s3_use_ssl }}
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 2Gi
          command: []
          args: []
          ports:
            - containerPort: 3000
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: vn-appvn-datavn-configvn-json
              mountPath: /app/data/config.json
              subPath: ./app/data/config.json
      volumes:
        - name: vn-appvn-datavn-configvn-json
          configMap:
            name: ${{ defaults.app_name }}
            items:
              - key: vn-appvn-datavn-configvn-json
                path: ./app/data/config.json

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ defaults.app_name }}
data:
  vn-appvn-datavn-configvn-json: |
    {
      "feConfigs": {
        "lafEnv": "https://laf.dev" ,
        "mcpServerProxyEndpoint": "http://${{ defaults.app_host }}-mcp-server.${{ SEALOS_CLOUD_DOMAIN }}"
      },
      "systemEnv": {
        "vectorMaxProcess": 15, 
        "qaMaxProcess": 15, 
        "tokenWorkers": 30,
        "pgHNSWEfSearch": 100 
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  ports:
    - port: 3000
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/ssl-redirect: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 3000
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}-plugin
  annotations:
    originImageName: registry.cn-hangzhou.aliyuncs.com/fastgpt/fastgpt-plugin:v0.3.4
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
    deploy.cloud.sealos.io/resize: 0Gi
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-plugin
    app: ${{ defaults.app_name }}-plugin
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-plugin
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-plugin
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-plugin
          image: registry.cn-hangzhou.aliyuncs.com/fastgpt/fastgpt-plugin:v0.3.4
          env:
            - name: S3_EXTERNAL_BASE_URL
              value: ${{ inputs.s3_external_base_url }}
            - name: S3_ENDPOINT
              value: ${{ inputs.s3_endpoint }}
            - name: S3_PORT
              value: ${{ inputs.s3_port }}
            - name: S3_ACCESS_KEY
              value: ${{ inputs.s3_access_key }}
            - name: S3_SECRET_KEY
              value: ${{ inputs.s3_secret_key }}
            - name: S3_PUBLIC_BUCKET
              value: ${{ inputs.s3_public_bucket }}
            - name: S3_PRIVATE_BUCKET
              value: ${{ inputs.s3_private_bucket }}
            - name: S3_USE_SSL
              value: ${{ inputs.s3_use_ssl }}
            - name: AUTH_TOKEN
              value: ${{ defaults.plugin_token }}
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mongo-conn-credential
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: password
            - name: MONGODB_URI
              value: >-
                mongodb://root:$(MONGO_PASSWORD)@${{ defaults.app_name }}-mongo-mongodb.${{ SEALOS_NAMESPACE }}.svc:27017/fastgpt?authSource=admin
            - name: REDIS_URL
              value: >-
                redis://default:$(REDIS_PASSWORD)@${{ defaults.app_name }}-redis-redis.${{ SEALOS_NAMESPACE }}.svc:6379

          resources:
            requests:
              cpu: 20m
              memory: 25Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 3000
          imagePullPolicy: Always
          volumeMounts: []
      volumes: []

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-plugin
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-plugin
spec:
  ports:
    - port: 3000
  selector:
    app: ${{ defaults.app_name }}-plugin

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-aiproxy
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-aiproxy
spec:
  ports:
    - port: 3000
  selector:
    app: ${{ defaults.app_name }}-aiproxy

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}-aiproxy
  annotations:
    originImageName: registry.cn-hangzhou.aliyuncs.com/labring/aiproxy:v0.3.3
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
    deploy.cloud.sealos.io/resize: 0Gi
  labels:
    app: ${{ defaults.app_name }}-aiproxy
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-aiproxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-aiproxy
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-aiproxy
          image: registry.cn-hangzhou.aliyuncs.com/labring/aiproxy:v0.3.3
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: ADMIN_KEY
              value: ${{ defaults.aiproxy_key }}
            - name: LOG_DETAIL_STORAGE_HOURS
              value: '1'
            - name: DISABLE_MODEL_CONFIG
              value: 'true'
            - name: LOG_STORAGE_HOURS
              value: '168'
            - name: SQL_DSN
              value: >-
                postgresql://postgres:$(PG_PASSWORD)@${{ defaults.app_name }}-pg-postgresql.${{ SEALOS_NAMESPACE }}.svc:5432/postgres
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 102Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          ports:
            - containerPort: 3000
              name: ${{ random(12) }}
          imagePullPolicy: Always
          volumeMounts: []
      volumes: []

---
