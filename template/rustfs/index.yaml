apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: rustfs
spec:
  title: 'RustFS'
  url: 'https://github.com/rustfs/rustfs'
  gitRepo: 'https://github.com/rustfs/rustfs'
  author: 'Sealos'
  description: 'RustFS is a high-performance, distributed object storage system built in Rust.'
  readme: 'https://raw.githubusercontent.com/labring-actions/templates/main/template/rustfs/README.md'
  icon: 'https://avatars.githubusercontent.com/u/151849438?s=200&v=4'
  templateType: inline
  locale: en
  i18n:
    zh:
      title: 'RustFS'
      description: 'RustFS 是一个使用 Rust 构建的高性能分布式对象存储系统。'
      readme: 'https://raw.githubusercontent.com/labring-actions/templates/main/template/rustfs/README_zh.md'
  categories:
    - storage
    - backend
  defaults:
    app_name:
      type: string
      value: rustfs-${{ random(8) }}
    app_host:
      type: string
      value: rustfs-${{ random(8) }}
  inputs:
    access_key:
      description: 'S3 access key used by RustFS for authentication'
      type: string
      default: ''
      required: true
    secret_key:
      description: 'S3 secret key used by RustFS for authentication'
      type: string
      default: ''
      required: true
    data_volume_size:
      description: 'Persistent storage size for each RustFS data volume in GiB (4 data PVCs per pod)'
      type: string
      default: '1'
      required: false
    logs_volume_size:
      description: 'Persistent storage size for each RustFS logs volume in GiB'
      type: string
      default: '1'
      required: false

---
apiVersion: v1
kind: Secret
metadata:
  name: ${{ defaults.app_name }}-secret
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
type: Opaque
data:
  RUSTFS_ACCESS_KEY: ${{ base64(inputs.access_key) }}
  RUSTFS_SECRET_KEY: ${{ base64(inputs.secret_key) }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ defaults.app_name }}-config
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
data:
  RUSTFS_ADDRESS: ':9000'
  RUSTFS_CONSOLE_ADDRESS: ':9001'
  RUSTFS_CONSOLE_ENABLE: 'true'
  RUSTFS_OBS_LOG_DIRECTORY: /logs
  RUSTFS_OBS_LOGGER_LEVEL: info
  RUSTFS_OBS_ENVIRONMENT: development
  RUSTFS_REGION: us-east-1
  RUSTFS_ERASURE_SET_DRIVE_COUNT: '16'
  RUSTFS_STORAGE_CLASS_STANDARD: EC:4
  RUSTFS_VOLUMES: http://${{ defaults.app_name }}-{0...3}.${{ defaults.app_name }}-headless.${{ SEALOS_NAMESPACE }}.svc.cluster.local:9000/data/rustfs{0...3}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: rustfs/rustfs:1.0.0-alpha.85
    deploy.cloud.sealos.io/minReplicas: '4'
    deploy.cloud.sealos.io/maxReplicas: '4'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 4
  podManagementPolicy: Parallel
  revisionHistoryLimit: 1
  serviceName: ${{ defaults.app_name }}-headless
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsUser: 10001
      initContainers:
        - name: init-step
          image: busybox:stable
          imagePullPolicy: IfNotPresent
          env:
            - name: REPLICA_COUNT
              value: '4'
          command:
            - sh
            - -c
            - |
              if [ "$REPLICA_COUNT" -eq 4 ]; then
                for i in $(seq 0 $(($REPLICA_COUNT - 1))); do
                  mkdir -p /data/rustfs$i
                done
              elif [ "$REPLICA_COUNT" -eq 16 ]; then
                mkdir -p /data
              fi
              mkdir -p /mnt/rustfs/logs
              chmod 755 /mnt/rustfs/logs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: data-rustfs-0
              mountPath: /data/rustfs0
            - name: data-rustfs-1
              mountPath: /data/rustfs1
            - name: data-rustfs-2
              mountPath: /data/rustfs2
            - name: data-rustfs-3
              mountPath: /data/rustfs3
            - name: logs
              mountPath: /mnt/rustfs
      containers:
        - name: ${{ defaults.app_name }}
          image: rustfs/rustfs:1.0.0-alpha.85
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/rustfs
          envFrom:
            - configMapRef:
                name: ${{ defaults.app_name }}-config
            - secretRef:
                name: ${{ defaults.app_name }}-secret
          ports:
            - containerPort: 9000
              name: endpoint
              protocol: TCP
            - containerPort: 9001
              name: console
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          startupProbe:
            httpGet:
              path: /health
              port: endpoint
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: endpoint
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: endpoint
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2048Mi
          volumeMounts:
            - name: logs
              mountPath: /logs
              subPath: logs
            - name: data-rustfs-0
              mountPath: /data/rustfs0
            - name: data-rustfs-1
              mountPath: /data/rustfs1
            - name: data-rustfs-2
              mountPath: /data/rustfs2
            - name: data-rustfs-3
              mountPath: /data/rustfs3
  volumeClaimTemplates:
    - metadata:
        annotations:
          path: /logs
          value: '1'
        name: logs
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.logs_volume_size }}Gi
        storageClassName: openebs-hostpath
    - metadata:
        annotations:
          path: /data/rustfs0
          value: '1'
        name: data-rustfs-0
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.data_volume_size }}Gi
        storageClassName: openebs-hostpath
    - metadata:
        annotations:
          path: /data/rustfs1
          value: '1'
        name: data-rustfs-1
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.data_volume_size }}Gi
        storageClassName: openebs-hostpath
    - metadata:
        annotations:
          path: /data/rustfs2
          value: '1'
        name: data-rustfs-2
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.data_volume_size }}Gi
        storageClassName: openebs-hostpath
    - metadata:
        annotations:
          path: /data/rustfs3
          value: '1'
        name: data-rustfs-3
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.data_volume_size }}Gi
        storageClassName: openebs-hostpath

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: endpoint
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  type: ClusterIP
  ports:
    - name: endpoint
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: '0'
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-expires: '3600'
    nginx.ingress.kubernetes.io/session-cookie-hash: sha1
    nginx.ingress.kubernetes.io/session-cookie-max-age: '3600'
    nginx.ingress.kubernetes.io/session-cookie-name: ${{ defaults.app_name }}
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 9001
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: 'https://avatars.githubusercontent.com/u/151849438?s=200&v=4'
  name: 'RustFS'
  type: link
