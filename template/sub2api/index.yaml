apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: sub2api
spec:
  title: Sub2API
  url: https://demo.sub2api.org/
  gitRepo: https://github.com/Wei-Shaw/sub2api
  author: Wei-Shaw
  description: AI API gateway platform for distributing and managing subscription quota across upstream AI services.
  readme: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/sub2api/README.md
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/sub2api/logo.png
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 面向上游 AI 服务订阅额度分发与管理的 API 网关平台，支持多账号接入、密钥分发、计费与调度。
      readme: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/sub2api/README_zh.md
  categories:
    - ai
    - tool
    - backend
  defaults:
    app_host:
      type: string
      value: sub2api-${{ random(8) }}
    app_name:
      type: string
      value: sub2api-${{ random(8) }}
    jwt_secret:
      type: string
      value: ${{ random(32) }}
    totp_encryption_key:
      type: string
      value: ${{ random(64).toLowerCase().replace(/[^0-9a-f]/g, 'a') }}
  inputs:
    admin_email:
      description: Administrator email address
      type: string
      default: admin@sub2api.local
      required: false
    admin_password:
      description: Administrator password (leave empty to auto-generate on first startup)
      type: string
      default: ""
      required: false
    timezone:
      description: Timezone used by the application
      type: string
      default: Asia/Shanghai
      required: false
    run_mode:
      description: Application run mode
      type: choice
      default: standard
      required: false
      options:
        - standard
        - simple
    gemini_oauth_client_id:
      description: Gemini OAuth client ID
      type: string
      default: ""
      required: false
    gemini_oauth_client_secret:
      description: Gemini OAuth client secret
      type: string
      default: ""
      required: false
    gemini_oauth_scopes:
      description: Gemini OAuth scopes
      type: string
      default: ""
      required: false
    gemini_quota_policy:
      description: Gemini quota policy
      type: string
      default: ""
      required: false
    gemini_cli_oauth_client_secret:
      description: Gemini CLI built-in OAuth client secret
      type: string
      default: ""
      required: false
    antigravity_oauth_client_secret:
      description: Antigravity OAuth client secret
      type: string
      default: ""
      required: false
    security_url_allowlist_enabled:
      description: Enable upstream URL allowlist validation
      type: boolean
      default: "false"
      required: false
    security_url_allowlist_allow_insecure_http:
      description: Allow insecure HTTP URLs when allowlist is disabled
      type: boolean
      default: "false"
      required: false
    security_url_allowlist_allow_private_hosts:
      description: Allow private IP addresses for upstream and pricing access
      type: boolean
      default: "false"
      required: false
    security_url_allowlist_upstream_hosts:
      description: Comma-separated upstream hosts allowlist
      type: string
      default: ""
      required: false
    update_proxy_url:
      description: Proxy URL used for update checks and GitHub access
      type: string
      default: ""
      required: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
rules:
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - "*"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ defaults.app_name }}-pg
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-pg

---
apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    kb.io/database: postgresql-16.4.0
    clusterdefinition.kubeblocks.io/name: postgresql
    clusterversion.kubeblocks.io/name: postgresql-16.4.0
spec:
  affinity:
    podAntiAffinity: Preferred
    tenancy: SharedNode
  clusterDefinitionRef: postgresql
  clusterVersionRef: postgresql-16.4.0
  terminationPolicy: Delete
  componentSpecs:
    - name: postgresql
      componentDefRef: postgresql
      disableExporter: true
      enabledLogs:
        - running
      replicas: 1
      serviceAccountName: ${{ defaults.app_name }}-pg
      switchPolicy:
        type: Noop
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${{ defaults.app_name }}-pg-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: pgsql-init
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: PG_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: endpoint
            - name: PG_DATABASE
              value: sub2api
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              for i in $(seq 1 60); do
                if pg_isready -h "${PG_ENDPOINT%:*}" -p "${PG_ENDPOINT##*:}" -U postgres -d postgres >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              pg_isready -h "${PG_ENDPOINT%:*}" -p "${PG_ENDPOINT##*:}" -U postgres -d postgres >/dev/null 2>&1
              if ! psql "postgresql://postgres:$(PG_PASSWORD)@$(PG_ENDPOINT)/postgres" -tAc "SELECT 1 FROM pg_database WHERE datname='$(PG_DATABASE)'" | grep -q 1; then
                psql "postgresql://postgres:$(PG_PASSWORD)@$(PG_ENDPOINT)/postgres" -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"$(PG_DATABASE)\";"
              fi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ defaults.app_name }}-redis
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-redis
    app.kubernetes.io/instance: ${{ defaults.app_name }}-redis
    app.kubernetes.io/managed-by: kbcli

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ defaults.app_name }}-redis
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-redis
    app.kubernetes.io/instance: ${{ defaults.app_name }}-redis
    app.kubernetes.io/managed-by: kbcli
rules:
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - "*"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ defaults.app_name }}-redis
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-redis
    app.kubernetes.io/instance: ${{ defaults.app_name }}-redis
    app.kubernetes.io/managed-by: kbcli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ defaults.app_name }}-redis
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-redis

---
apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: ${{ defaults.app_name }}-redis
  labels:
    kb.io/database: redis-7.2.7
    app.kubernetes.io/instance: ${{ defaults.app_name }}-redis
    app.kubernetes.io/version: 7.2.7
    clusterversion.kubeblocks.io/name: redis-7.2.7
    clusterdefinition.kubeblocks.io/name: redis
spec:
  affinity:
    podAntiAffinity: Preferred
    tenancy: SharedNode
    topologyKeys:
      - kubernetes.io/hostname
  clusterDefinitionRef: redis
  componentSpecs:
    - name: redis
      componentDef: redis-7
      replicas: 1
      enabledLogs:
        - running
      env:
        - name: CUSTOM_SENTINEL_MASTER_NAME
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      serviceAccountName: ${{ defaults.app_name }}-redis
      serviceVersion: 7.2.7
      switchPolicy:
        type: Noop
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup
    - name: redis-sentinel
      componentDef: redis-sentinel-7
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      serviceAccountName: ${{ defaults.app_name }}-redis
      serviceVersion: 7.2.7
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
  terminationPolicy: Delete
  topology: replication

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: weishaw/sub2api:0.1.104
    deploy.cloud.sealos.io/minReplicas: "1"
    deploy.cloud.sealos.io/maxReplicas: "1"
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  serviceName: ${{ defaults.app_name }}
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ${{ defaults.app_name }}
          image: weishaw/sub2api:0.1.104
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: AUTO_SETUP
              value: "true"
            - name: SERVER_HOST
              value: 0.0.0.0
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_MODE
              value: release
            - name: DATA_DIR
              value: /app/data
            - name: RUN_MODE
              value: ${{ inputs.run_mode }}
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: DATABASE_DBNAME
              value: sub2api
            - name: DATABASE_SSLMODE
              value: disable
            - name: DATABASE_MAX_OPEN_CONNS
              value: "50"
            - name: DATABASE_MAX_IDLE_CONNS
              value: "10"
            - name: DATABASE_CONN_MAX_LIFETIME_MINUTES
              value: "30"
            - name: DATABASE_CONN_MAX_IDLE_TIME_MINUTES
              value: "5"
            - name: REDIS_HOST
              value: ${{ defaults.app_name }}-redis-redis-redis.${{ SEALOS_NAMESPACE }}.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-redis-account-default
                  key: password
            - name: REDIS_DB
              value: "0"
            - name: REDIS_POOL_SIZE
              value: "1024"
            - name: REDIS_MIN_IDLE_CONNS
              value: "10"
            - name: REDIS_ENABLE_TLS
              value: "false"
            - name: ADMIN_EMAIL
              value: ${{ inputs.admin_email }}
            - name: ADMIN_PASSWORD
              value: ${{ inputs.admin_password }}
            - name: JWT_SECRET
              value: ${{ defaults.jwt_secret }}
            - name: JWT_EXPIRE_HOUR
              value: "24"
            - name: TOTP_ENCRYPTION_KEY
              value: ${{ defaults.totp_encryption_key }}
            - name: TZ
              value: ${{ inputs.timezone }}
            - name: GEMINI_OAUTH_CLIENT_ID
              value: ${{ inputs.gemini_oauth_client_id }}
            - name: GEMINI_OAUTH_CLIENT_SECRET
              value: ${{ inputs.gemini_oauth_client_secret }}
            - name: GEMINI_OAUTH_SCOPES
              value: ${{ inputs.gemini_oauth_scopes }}
            - name: GEMINI_QUOTA_POLICY
              value: ${{ inputs.gemini_quota_policy }}
            - name: GEMINI_CLI_OAUTH_CLIENT_SECRET
              value: ${{ inputs.gemini_cli_oauth_client_secret }}
            - name: ANTIGRAVITY_OAUTH_CLIENT_SECRET
              value: ${{ inputs.antigravity_oauth_client_secret }}
            - name: SECURITY_URL_ALLOWLIST_ENABLED
              value: ${{ inputs.security_url_allowlist_enabled }}
            - name: SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP
              value: ${{ inputs.security_url_allowlist_allow_insecure_http }}
            - name: SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS
              value: ${{ inputs.security_url_allowlist_allow_private_hosts }}
            - name: SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS
              value: ${{ inputs.security_url_allowlist_upstream_hosts }}
            - name: UPDATE_PROXY_URL
              value: ${{ inputs.update_proxy_url }}
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: vn-appvn-data
              mountPath: /app/data
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18
  volumeClaimTemplates:
    - metadata:
        name: vn-appvn-data
        annotations:
          path: /app/data
          value: "0.1"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 103Mi

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 8080
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/sub2api/logo.png
  name: Sub2API
  type: link
