apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: openclaw
spec:
  title: OpenClaw
  url: https://openclaw.ai/
  gitRepo: https://github.com/openclaw/openclaw
  author: Sealos
  description: Self-hosted AI assistant gateway with support for WhatsApp, Telegram, Discord, Slack, and custom model providers
  readme: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/README.md
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/logo.svg
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 自托管 AI 智能体网关，支持 WhatsApp、Telegram、Discord、Slack 及自定义模型提供商
      readme: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/README_zh.md
  categories: [ai, tool]
  defaults:
    app_name:
      type: string
      value: openclaw-${{ random(8) }}
    app_host:
      type: string
      value: openclaw-${{ random(8) }}
  inputs:
    "模型提供商类型":
      description: 模型兼容协议（openai_compat 或 anthropic_compat）
      type: choice
      options:
        - openai_compat
        - anthropic_compat
      default: openai_compat
      required: true
    "模型接口地址":
      description: OpenAI 兼容接口请填写到 /v1
      type: string
      default: https://aiproxy.usw-1.sealos.io/v1
      required: true
    "API密钥":
      description: 模型提供商的API Key
      type: string
      default: ""
      required: true
    "默认模型":
      description: 模型 ID，例 gpt-5.4
      type: string
      default: gpt-5.4
      required: true
    "登录令牌":
      description: 需要英文+数字
      type: string
      default: "sealos2026"
      required: true

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/openclaw/openclaw:2026.3.28
    deploy.cloud.sealos.io/minReplicas: "1"
    deploy.cloud.sealos.io/maxReplicas: "1"
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  serviceName: ${{ defaults.app_name }}
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-openclaw-home
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              mkdir -p /home/node/.openclaw /home/node/.openclaw/workspace
              chown -R 1000:1000 /home/node/.openclaw
          volumeMounts:
            - name: vn-homevn-nodevn-openclaw
              mountPath: /home/node/.openclaw
        - name: init-openclaw-config
          image: ghcr.io/openclaw/openclaw:2026.3.28
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: NODE_OPTIONS
              value: --max-old-space-size=1024
            - name: OPENCLAW_PROVIDER_KIND
              value: '${{ inputs["模型提供商类型"] }}'
            - name: OPENCLAW_MODEL_BASE_URL
              value: '${{ inputs["模型接口地址"] }}'
            - name: OPENCLAW_DEFAULT_MODEL
              value: '${{ inputs["默认模型"] }}'
            - name: OPENCLAW_GATEWAY_TOKEN
              value: '${{ inputs["登录令牌"] }}'
            - name: CUSTOM_API_KEY
              value: '${{ inputs["API密钥"] }}'
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              PUBLIC_ORIGIN="https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}"

              if [ "${OPENCLAW_PROVIDER_KIND}" = "openai_compat" ]; then
                CUSTOM_PROVIDER_ID="custom-openai"
                PROVIDER_API="openai-completions"
              elif [ "${OPENCLAW_PROVIDER_KIND}" = "anthropic_compat" ]; then
                CUSTOM_PROVIDER_ID="custom-anthropic"
                PROVIDER_API="anthropic-messages"
              else
                CUSTOM_PROVIDER_ID="custom-openai"
                PROVIDER_API="openai-completions"
              fi

              cat > /home/node/.openclaw/openclaw.json <<EOF
              {
                "models": {
                  "mode": "merge",
                  "providers": {
                    "${CUSTOM_PROVIDER_ID}": {
                      "baseUrl": "${OPENCLAW_MODEL_BASE_URL}",
                      "apiKey": "${CUSTOM_API_KEY}",
                      "api": "${PROVIDER_API}",
                      "models": [
                        {
                          "id": "${OPENCLAW_DEFAULT_MODEL}",
                          "name": "${OPENCLAW_DEFAULT_MODEL} (Custom Provider)",
                          "reasoning": false,
                          "input": ["text"],
                          "cost": {
                            "input": 0,
                            "output": 0,
                            "cacheRead": 0,
                            "cacheWrite": 0
                          },
                          "contextWindow": 128000,
                          "maxTokens": 8192
                        }
                      ]
                    }
                  }
                },
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "${CUSTOM_PROVIDER_ID}/${OPENCLAW_DEFAULT_MODEL}"
                    },
                    "models": {
                      "${CUSTOM_PROVIDER_ID}/${OPENCLAW_DEFAULT_MODEL}": {}
                    },
                    "workspace": "/home/node/.openclaw/workspace"
                  }
                },
                "commands": {
                  "native": "auto",
                  "nativeSkills": "auto",
                  "restart": true,
                  "ownerDisplay": "raw"
                },
                "session": {
                  "dmScope": "per-channel-peer"
                },
                "gateway": {
                  "port": 18789,
                  "mode": "local",
                  "bind": "lan",
                  "controlUi": {
                    "enabled": true,
                    "allowedOrigins": ["${PUBLIC_ORIGIN}"],
                    "dangerouslyAllowHostHeaderOriginFallback": true,
                    "dangerouslyDisableDeviceAuth": true
                  },
                  "auth": {
                    "mode": "token",
                    "token": "${OPENCLAW_GATEWAY_TOKEN}"
                  },
                  "tailscale": {
                    "mode": "off",
                    "resetOnExit": false
                  }
                }
              }
              EOF
          volumeMounts:
            - name: vn-homevn-nodevn-openclaw
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1536Mi
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/openclaw/openclaw:2026.3.28
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
            - name: TERM
              value: xterm-256color
            - name: OPENCLAW_GATEWAY_TOKEN
              value: '${{ inputs["登录令牌"] }}'
            - name: CUSTOM_API_KEY
              value: '${{ inputs["API密钥"] }}'
          command:
            - /bin/sh
            - -lc
            - node dist/index.js gateway --bind lan --port 18789
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: vn-homevn-nodevn-openclaw
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: vn-homevn-nodevn-openclaw
        annotations:
          path: /home/node/.openclaw
          value: "1"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  type: ClusterIP
  selector:
    app: ${{ defaults.app_name }}
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 18789
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}/#token=${{ inputs["登录令牌"] }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/openclaw/logo.svg
  name: OpenClaw
  type: link
