apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: nexus
spec:
  title: Nexus
  url: https://www.sonatype.com/products/sonatype-nexus-repository
  gitRepo: https://github.com/sonatype/nexus-public
  author: Sonatype
  description: A robust package registry built on extensive enterprise storage capabilities.
  readme: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/nexus/README.md
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/nexus/logo.png
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 一个强大的软件仓库管理工具，用于存储和管理软件开发过程中的各类组件。
      readme: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/nexus/README_zh.md
  categories:
    - tool
    - dev-ops
  defaults:
    app_host:
      type: string
      value: nexus-${{ random(8) }}
    app_name:
      type: string
      value: nexus-${{ random(8) }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: sonatype/nexus3:3.89.1
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: ${{ defaults.app_name }}
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      terminationGracePeriodSeconds: 10
      automountServiceAccountToken: false
      initContainers:
        - name: take-data-dir-ownership
          image: alpine:3.22.2
          command:
            - /bin/sh
            - -c
            - chown -R 200:200 /nexus-data
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: vn-nexus-data
              mountPath: /nexus-data
      containers:
        - name: ${{ defaults.app_name }}
          image: sonatype/nexus3:3.89.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: INSTALL4J_ADD_VM_PARAMS
              value: >-
                -Xms1200M -Xmx1200M -XX:MaxDirectMemorySize=2G
                -XX:+UnlockExperimentalVMOptions
          resources:
            requests:
              cpu: 500m
              memory: 1024Mi
            limits:
              cpu: 2000m
              memory: 2048Mi
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: vn-nexus-data
              mountPath: /nexus-data
  volumeClaimTemplates:
    - metadata:
        annotations:
          path: /nexus-data
          value: '1'
        name: vn-nexus-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 8081
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/nexus/logo.png
  name: Nexus
  type: link
