    originImageName: ghcr.io/insforge/deno-runtime:2.0.6
    deploy.cloud.sealos.io/minReplicas: "1"
    deploy.cloud.sealos.io/maxReplicas: "1"
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-deno
    app: ${{ defaults.app_name }}-deno
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-deno
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-deno
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-deno
          image: ghcr.io/insforge/deno-runtime:2.0.6
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          ports:
            - containerPort: 7133
          env:
            - name: PORT
              value: "7133"
            - name: DENO_ENV
              value: production
            - name: DENO_DIR
              value: /deno-dir
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: POSTGREST_BASE_URL
              value: http://${{ defaults.app_name }}-postgrest.${{ SEALOS_NAMESPACE }}.svc.cluster.local:3000
            - name: WORKER_TIMEOUT_MS
              value: "60000"
            - name: ENCRYPTION_KEY
              value: ${{ defaults.encryption_key }}
            - name: JWT_SECRET
              value: ${{ defaults.jwt_secret }}
          livenessProbe:
            httpGet:
              path: /health
              port: 7133
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 7133
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 7133
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: vn-denovn-dir
              mountPath: /deno-dir
  serviceName: ${{ defaults.app_name }}-deno
  volumeClaimTemplates:
    - metadata:
        name: vn-denovn-dir
        annotations:
          path: /deno-dir
          value: "0.1"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 103Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  ports:
    - name: http-api
      port: 7130
      targetPort: 7130
      protocol: TCP
    - name: http-dashboard
      port: 7131
      targetPort: 7131
      protocol: TCP
    - name: http-auth
      port: 7132
      targetPort: 7132
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-postgrest
  labels:
    app: ${{ defaults.app_name }}-postgrest
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-postgrest
spec:
  ports:
    - name: http-postgrest
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}-postgrest
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-deno
  labels:
    app: ${{ defaults.app_name }}-deno
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-deno
spec:
  ports:
    - name: http-deno
      port: 7133
      targetPort: 7133
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}-deno
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 7130
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/insforge/logo.svg
  name: InsForge
  type: link
