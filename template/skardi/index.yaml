# Template CR
apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: skardi
  labels:
    cloud.sealos.io/app-deploy-manager: skardi
spec:
  title: 'Skardi'
  url: 'https://github.com/SkardiLabs/skardi'
  gitRepo: 'https://github.com/SkardiLabs/skardi'
  author: 'Sealos'
  description: 'SQL across anything: query, join, and aggregate over files, databases, S3, and vector stores — turn any SQL into a parameterized HTTP API with zero application code, written in Rust'
  readme: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/skardi/README.md'
  icon: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/skardi/logo.png'
  templateType: inline
  locale: en
  i18n:
    zh:
      description: '跨多源 SQL 查询引擎：零代码将 SQL 查询转为参数化 HTTP API，支持文件、数据库、S3 和向量存储，基于 Rust 与 Apache DataFusion 构建'
      readme: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/skardi/README_zh.md'
  categories:
    - tool
    - backend
  defaults:
    app_host:
      type: string
      value: skardi-${{ random(8) }}
    app_name:
      type: string
      value: skardi-${{ random(8) }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ defaults.app_name }}-config
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
data:
  ctx.yaml: |
    data_sources:
      - name: "products"
        type: "csv"
        path: "/data/products.csv"
        enable_cache: true
        options:
          has_header: true
          delimiter: ","
          schema_infer_max_records: 100
        description: "Sample product catalog — replace with your own data sources"
  pipeline.yaml: |
    metadata:
      name: product-search
      version: 1.0.0
      description: "Sample product search pipeline — replace with your own SQL queries"

    query: |
      SELECT
        "Index"        AS product_id,
        "Name"         AS product_name,
        "Brand"        AS brand,
        "Category"     AS category,
        "Price"        AS price,
        "Color"        AS color,
        "Availability" AS availability
      FROM products
      WHERE 1=1
        AND ({brand}    IS NULL OR "Brand"    = {brand})
        AND ({max_price} IS NULL OR "Price"   < {max_price})
        AND ({category} IS NULL OR "Category" = {category})
      ORDER BY "Price" ASC
      LIMIT {limit}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/skardilabs/skardi/skardi-server:latest
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  serviceName: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: init-sample-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Only write sample data on first run — preserves any files the user uploads later
              if [ ! -f /data/products.csv ]; then
                cat > /data/products.csv << 'CSVEOF'
              Index,Name,Description,Brand,Category,Price,Currency,Stock,Color,Availability
              1,Smart Fan,Portable wireless fan,Herman Ltd,Appliances,29.99,USD,194,Blue,in_stock
              2,Wireless Speaker,Premium audio quality,Braun,Electronics,79.99,USD,52,Black,in_stock
              3,Eco Charger,Fast charging eco-friendly,Peck-Coleman,Electronics,24.99,USD,312,White,in_stock
              4,Premium Grill,Portable outdoor grill,Hines Ltd,Outdoors,149.99,USD,18,Silver,limited_stock
              5,Smart Watch,Health tracking wearable,TechCo,Electronics,199.99,USD,89,Black,pre_order
              6,Running Shoes,Lightweight performance shoes,SpeedFit,Footwear,89.99,USD,245,Red,in_stock
              7,Coffee Maker,12-cup programmable,BrewMaster,Kitchen,59.99,USD,67,Stainless,in_stock
              8,Yoga Mat,Non-slip eco material,ZenFit,Sports,34.99,USD,188,Purple,in_stock
              9,Laptop Stand,Adjustable aluminum,DeskPro,Accessories,49.99,USD,134,Silver,in_stock
              10,LED Desk Lamp,Touch-controlled brightness,LightTech,Lighting,39.99,USD,76,White,in_stock
              CSVEOF
              fi
          volumeMounts:
            - name: vn-data
              mountPath: /data
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/skardilabs/skardi/skardi-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - --ctx
            - /config/ctx.yaml
            - --pipeline
            - /config/pipeline.yaml
            - --port
            - "8080"
          env:
            - name: RUST_LOG
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: vn-data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ${{ defaults.app_name }}-config
  volumeClaimTemplates:
    - metadata:
        name: vn-data
        annotations:
          path: /data
          value: '1'
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 8080
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: 'https://raw.githubusercontent.com/labring-actions/templates/kb-0.9/template/skardi/logo.png'
  name: 'Skardi'
  type: link
